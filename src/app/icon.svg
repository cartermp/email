<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title">
  <title id="title">Mail</title>

  <!-- Quiet slate tile, matching the application shell in both themes. -->
  <rect
    x="16"
    y="16"
    width="224"
    height="224"
    rx="52"
    fill="#0f172a"
    stroke="#334155"
    stroke-width="8"
  />

  <!-- A deliberately simple envelope remains legible at 16px. -->
  <rect x="48" y="68" width="160" height="124" rx="24" fill="#f8fafc" />
  <path
    d="m58 86 58 49c7 6 17 6 24 0l58-49"
    fill="none"
    stroke="#475569"
    stroke-width="12"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <path
    d="m58 178 48-42m92 42-48-42"
    fill="none"
    stroke="#cbd5e1"
    stroke-width="10"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- The same restrained blue used for focus and unread state. -->
  <circle cx="198" cy="62" r="24" fill="#3b82f6" stroke="#0f172a" stroke-width="8" />
</svg>
