when:
  - event: ["push"]
    branch: ["main"]
  - event: ["pull_request"]

engine: "nixery"

clone:
  depth: 1

dependencies:
  nixpkgs:
    - bash
    - curl
    - git
    - nodejs
    - pnpm

environment:
  CI: "true"

steps:
  - name: "Versions"
    command: |
      node --version
      pnpm --version

  - name: "Install dependencies"
    command: |
      pnpm install --frozen-lockfile

  - name: "Test"
    command: |
      pnpm test

  - name: "Install Railway CLI"
    when:
      - event: ["push"]
        branch: ["main"]
    command: |
      curl -fsSL https://railway.com/install.sh | sh
      export PATH="$HOME/.railway/bin:$PATH"
      railway --version

  - name: "Deploy to Railway"
    when:
      - event: ["push"]
        branch: ["main"]
    command: |
      export PATH="$HOME/.railway/bin:$PATH"
      RAILWAY_TOKEN=$RAILWAY_TOKEN railway up --ci